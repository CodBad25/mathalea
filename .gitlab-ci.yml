# Secret Detection customization: https://docs.gitlab.com/ee/user/application_security/secret_detection/#customizing-settings
# Dependency Scanning customization: https://docs.gitlab.com/ee/user/application_security/dependency_scanning/#customizing-the-dependency-scanning-settings
# Container Scanning customization: https://docs.gitlab.com/ee/user/application_security/container_scanning/#customizing-the-container-scanning-settings
# Note that environment variables can be set in several places
# See https://docs.gitlab.com/ee/ci/variables/#cicd-variable-precedence

stages:
  - test
  - build-projet
  - playwright-testCanEleve
  - deploy-server
  - playwright-test
  - compile-pdf
  - playwright-pdfDNB
  - playwright-pdfBAC
  - build_ci_pdf

variables:
  SAST_EXCLUDED_PATHS: 'node_modules,.pnpm-store,dist,build,coverage,logs,.cache,.git,tests/e2e,playwright-report'
  SAST_EXCLUDED_ANALYZERS: 'bandit,gosec,flawfinder,brakeman'
  FF_USE_POD_ACTIVE_DEADLINE_SECONDS: 'false'
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ''
  DOCKER_IMAGE: '$CI_REGISTRY_IMAGE/ci/tex-node:node22-texlive-2026-06'
  DOCKERFILE: docker/ci-pdf/Dockerfile

semgrep-sast:
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: never
    - when: never

sast:
  rules:
    - when: never

include:
  - template: Security/SAST.gitlab-ci.yml

default:
  interruptible: true # Annule le job si un nouveau pipeline démarre
  image: node:23.9.0

cache:
  key: 'pnpm-${CI_COMMIT_REF_SLUG}'
  paths:
    - .pnpm-store

build_ci_pdf:
  stage: build-projet
  image: gcr.io/kaniko-project/executor:v1.23.2-debug
  variables:
    DEST_IMAGE: '$CI_REGISTRY_IMAGE/ci/tex-node:node22-texlive-2026-06'
    CACHE_REPO: '$CI_REGISTRY_IMAGE/cache/kaniko'
  script:
    - mkdir -p /kaniko/.docker
    - echo "{\"auths\":{\"$CI_REGISTRY\":{\"username\":\"gitlab-ci-token\",\"password\":\"$CI_JOB_TOKEN\"}}}" > /kaniko/.docker/config.json
    - /kaniko/executor --destination="$DEST_IMAGE" --cache=true --cache-repo="$CACHE_REPO" --dockerfile="$DOCKERFILE"
  rules:
    - if: $CI_COMMIT_BRANCH == "pipeline"
      when: manual
    - if: $CI_COMMIT_BRANCH == "guironne-jobs"
      when: manual
    - when: never

.install_dependencies:
  before_script:
    - npm install -g corepack@latest
    - corepack enable
    - corepack prepare pnpm@latest-10 --activate
    - pnpm config set store-dir .pnpm-store
    - pnpm -v
    - NODE_OPTIONS=--max-old-space-size=4096 pnpm install --silent
    - nohup pnpm start 2>&1 >/dev/null &
    - sleep 20
    - until $(curl --output /dev/null --head --fail http://localhost:80/alea/); do printf '.'; sleep 10; done
    - sleep 60

.install_dependenciesPDF:
  before_script:
    - npm install -g pnpm@11.3
    - pnpm config set store-dir .pnpm-store
    - pnpm -v
    - lualatex -v
    - pnpm install --silent
    - nohup pnpm start 2>&1 >/dev/null &
    - sleep 10
    - until $(curl --output /dev/null --head --fail http://localhost:80/alea/); do printf '.'; sleep 10; done
    - sleep 30

.install_dependenciesPDFDNB:
  before_script:
    - npm install -g pnpm@11.3
    - pnpm config set store-dir .pnpm-store
    - pnpm -v
    - lualatex -v
    - git clone https://forge.apps.education.fr/coopmaths/dnb.git ./public/static/dnb
    - mv ./public/static/dnb/sujets_decoupes/* ./public/static/dnb/
    - pnpm install --silent
    - nohup pnpm start 2>&1 >/dev/null &
    - sleep 10
    - until $(curl --output /dev/null --head --fail http://localhost:80/alea/); do printf '.'; sleep 10; done
    - sleep 30

.install_dependenciesPDFBAC:
  before_script:
    - npm install -g pnpm@11.3
    - pnpm config set store-dir .pnpm-store
    - pnpm -v
    - lualatex -v
    - git clone https://forge.apps.education.fr/coopmaths/bac.git ./public/static/bac
    - pnpm install --silent
    - nohup pnpm start 2>&1 >/dev/null &
    - sleep 10
    - until $(curl --output /dev/null --head --fail http://localhost:80/alea/); do printf '.'; sleep 10; done
    - sleep 30

.testCIPDF:
  image: $DOCKER_IMAGE
  extends: .install_dependenciesPDF
  stage: compile-pdf
  allow_failure: true
  timeout: 2h 30m
  rules:
    - if: $CI_COMMIT_BRANCH == "guironne-jobs"
      when: manual
    - if: $CI_COMMIT_BRANCH == "mathalea-jobs"
      when: manual
    - if: $CI_PIPELINE_SOURCE == "schedule" && $CI_TEST_MA == "PDF"
      when: always
    - when: never
  retry:
    max: 2
    when:
      - runner_system_failure
      - api_failure
      - unknown_failure
  artifacts:
    when: always
    paths:
      - tests/e2e/logs
    reports:
      junit: tests/e2e/logs/junit-report.xml
    expire_in: 10 day
    # exclude:
    #  - updatefile/output/*.*

.testCI:
  extends: .install_dependencies
  image: mcr.microsoft.com/playwright:v1.60.0-noble
  stage: playwright-test
  allow_failure: true
  timeout: 3h 30m
  rules:
    - if: $CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "merge_request_event"
      when: always
    - if: $CI_COMMIT_BRANCH == "guironne-jobs"
      when: manual
    - if: $CI_PIPELINE_SOURCE == "schedule" && $CI_TEST_MA == "CONSOLE"
      when: always
    - when: never
  retry:
    max: 2
    when:
      - runner_system_failure
      - api_failure
      - unknown_failure
  artifacts:
    when: always
    paths:
      - ./tests/e2e/logs
    reports:
      junit: ./tests/e2e/logs/junit-report.xml
    expire_in: 10 day

.testExosModifiedConsolidated:
  extends: .install_dependencies
  image: mcr.microsoft.com/playwright:v1.60.0-noble
  stage: build-projet
  allow_failure: true
  timeout: 5h
  retry:
    max: 2
    when:
      - runner_system_failure
      - api_failure
      - unknown_failure
  artifacts:
    when: always
    paths:
      - tests/e2e/logs
    reports:
      junit:
        - tests/e2e/logs/junit-report.xml
    expire_in: 10 day

playwright-console-consolidated:
  extends: .testCI
  stage: playwright-test
  timeout: 5h
  script:
    - |
      FAIL=0

      run_console () {
        NIV_LABEL="$1"
        STATUS_VAR="$2"
        echo "🧪 console_errors NIV=$NIV_LABEL"
        if NIV="$NIV_LABEL" pnpm test:e2e:console_errors; then
          eval "$STATUS_VAR=ok"
        else
          eval "$STATUS_VAR=ko"
          FAIL=1
        fi
      }

      run_console "6e/6" STATUS_6E
      run_console "5e/5" STATUS_5E
      run_console "4e/4" STATUS_4E
      run_console "3e/3" STATUS_3E
      run_console "2e/2" STATUS_2E
      run_console "1e/1" STATUS_1E
      run_console "TEx^TSpe^techno" STATUS_TEX_TSPE_TECHNO
      run_console "QCM" STATUS_QCM
      run_console "can/6e^can/5e" STATUS_CAN_6E_5E
      run_console "can/4e^can/3e" STATUS_CAN_4E_3E
      run_console "can/2e^can/1e" STATUS_CAN_2E_1E
      run_console "can/Ex^can/TSpe" STATUS_CAN_EX_TSPE

      echo ""
      echo "═══════════════════════════════════════════"
      echo "📊 Résumé console consolidated"
      echo "═══════════════════════════════════════════"
      [ "$STATUS_6E" = "ok" ] && echo "✅ 6e/6" || echo "❌ 6e/6"
      [ "$STATUS_5E" = "ok" ] && echo "✅ 5e/5" || echo "❌ 5e/5"
      [ "$STATUS_4E" = "ok" ] && echo "✅ 4e/4" || echo "❌ 4e/4"
      [ "$STATUS_3E" = "ok" ] && echo "✅ 3e/3" || echo "❌ 3e/3"
      [ "$STATUS_2E" = "ok" ] && echo "✅ 2e/2" || echo "❌ 2e/2"
      [ "$STATUS_1E" = "ok" ] && echo "✅ 1e/1" || echo "❌ 1e/1"
      [ "$STATUS_TEX_TSPE_TECHNO" = "ok" ] && echo "✅ TEx^TSpe^techno" || echo "❌ TEx^TSpe^techno"
      [ "$STATUS_QCM" = "ok" ] && echo "✅ QCM" || echo "❌ QCM"
      [ "$STATUS_CAN_6E_5E" = "ok" ] && echo "✅ can/6e^can/5e" || echo "❌ can/6e^can/5e"
      [ "$STATUS_CAN_4E_3E" = "ok" ] && echo "✅ can/4e^can/3e" || echo "❌ can/4e^can/3e"
      [ "$STATUS_CAN_2E_1E" = "ok" ] && echo "✅ can/2e^can/1e" || echo "❌ can/2e^can/1e"
      [ "$STATUS_CAN_EX_TSPE" = "ok" ] && echo "✅ can/Ex^can/TSpe" || echo "❌ can/Ex^can/TSpe"
      echo "═══════════════════════════════════════════"

      exit "$FAIL"


stages:
  - test
  - build-projet
  - playwright-testCanEleve
  - deploy-server
  - playwright-test
  - playwright-pdf
  - playwright-pdfDNB
  - playwright-pdfBAC

variables:
  SAST_EXCLUDED_PATHS: 'node_modules,.pnpm-store,dist,build,coverage,logs,.cache,.git,tests/e2e,playwright-report'
  SAST_EXCLUDED_ANALYZERS: 'bandit,gosec,flawfinder,brakeman'
  FF_USE_POD_ACTIVE_DEADLINE_SECONDS: 'false'

semgrep-sast:
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: always
    - when: never

sast:
  rules:
    - when: never

include:
  - template: Security/SAST.gitlab-ci.yml

default:
  interruptible: true # Annule le job si un nouveau pipeline dГ©marre
  image: node:23.9.0

cache:
  key: 'pnpm-${CI_COMMIT_REF_SLUG}'
  paths:
    - .pnpm-store

.install_dependencies:
  before_script:
    - npm install -g corepack@latest
    - corepack enable
    - corepack prepare pnpm@latest-10 --activate
    - pnpm config set store-dir .pnpm-store
    - pnpm -v
    - pnpm add playwright@1.51.1 --save-dev
    - pnpm add @playwright/test@1.51.1 --save-dev
    - NODE_OPTIONS=--max-old-space-size=4096 pnpm install
    - nohup pnpm start &
    - sleep 20
    - until $(curl --output /dev/null --head --fail http://localhost:80/alea/); do printf '.'; sleep 10; done
    - sleep 60

.install_dependenciesPDF:
  before_script:
    - npm install -g corepack@latest
    - corepack enable
    - corepack prepare pnpm@latest-10 --activate
    - pnpm config set store-dir .pnpm-store
    - pnpm -v
    - lualatex -v
    - apt-get update --allow-releaseinfo-change
    - apt-get install -y libasound2t64 libgbm1 libgtk-3-0 libnss3 libx11-xcb1 libxcomposite1 libxdamage1 libxrandr2 xdg-utils
    - pnpm exec playwright install chromium
    - ls /root/.cache/ms-playwright/
    - pnpm add playwright@1.51.1 --save-dev
    - pnpm install
    - nohup pnpm start &
    - sleep 10
    - until $(curl --output /dev/null --head --fail http://localhost:80/alea/); do printf '.'; sleep 10; done
    - sleep 30

.install_dependenciesPDFDNB:
  before_script:
    - npm install -g corepack@latest
    - corepack enable
    - corepack prepare pnpm@latest-10 --activate
    - pnpm config set store-dir .pnpm-store
    - pnpm -v
    - lualatex -v
    - apt-get update --allow-releaseinfo-change
    - apt-get install -y libasound2t64 libgbm1 libgtk-3-0 libnss3 libx11-xcb1 libxcomposite1 libxdamage1 libxrandr2 xdg-utils
    - pnpm exec playwright install chromium
    - ls /root/.cache/ms-playwright/
    - pnpm add playwright@1.51.1 --save-dev
    - git clone https://forge.apps.education.fr/coopmaths/dnb.git ./public/static/dnb
    - mv ./public/static/dnb/sujets_decoupes/* ./public/static/dnb/
    - pnpm install
    - nohup pnpm start &
    - sleep 10
    - until $(curl --output /dev/null --head --fail http://localhost:80/alea/); do printf '.'; sleep 10; done
    - sleep 30

.install_dependenciesPDFBAC:
  before_script:
    - npm install -g corepack@latest
    - corepack enable
    - corepack prepare pnpm@latest-10 --activate
    # - pnpm config set store-dir .pnpm-store
    - pnpm -v
    - lualatex -v
    - apt-get update --allow-releaseinfo-change
    - apt-get install -y libasound2t64 libgbm1 libgtk-3-0 libnss3 libx11-xcb1 libxcomposite1 libxdamage1 libxrandr2 xdg-utils
    - pnpm exec playwright install chromium
    - pnpm add playwright@1.51.1 --save-dev
    - git clone https://forge.apps.education.fr/coopmaths/bac.git ./public/static/bac
    - pnpm install
    - nohup pnpm start &
    - sleep 10
    - until $(curl --output /dev/null --head --fail http://localhost:80/alea/); do printf '.'; sleep 10; done
    - sleep 30

.testCIPDF:
  image: guironne/tex-live-nodejs-playwright9
  extends: .install_dependenciesPDF
  stage: playwright-pdf
  allow_failure: true
  timeout: 2h 30m
  rules:
    - if: $CI_COMMIT_BRANCH == "guironne-jobs"
      when: manual
    - if: $CI_COMMIT_BRANCH == "mathalea-jobs"
      when: manual
    - if: $CI_PIPELINE_SOURCE == "schedule" && $CI_TEST_MA == "PDF"
      when: always
    - when: never
  retry:
    max: 2
    when:
      - runner_system_failure
      - api_failure
      - unknown_failure
  artifacts:
    when: always
    paths:
      - tests/e2e/logs
    reports:
      junit: tests/e2e/logs/junit-report.xml
    expire_in: 10 day
    # exclude:
    #  - updatefile/output/*.*

.testCI:
  extends: .install_dependencies
  image: mcr.microsoft.com/playwright:v1.60.0-noble
  stage: playwright-test
  allow_failure: true
  timeout: 3h 30m
  rules:
    - if: $CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "merge_request_event"
      when: always
    - if: $CI_COMMIT_BRANCH == "guironne-jobs"
      when: manual
    - if: $CI_PIPELINE_SOURCE == "schedule" && $CI_TEST_MA == "CONSOLE"
      when: always
    - when: never
  retry:
    max: 2
    when:
      - runner_system_failure
      - api_failure
      - unknown_failure
  artifacts:
    when: always
    paths:
      - tests/e2e/logs
    reports:
      junit: tests/e2e/logs/junit-report.xml
    expire_in: 10 day

.testExosModifiedConsolidated:
  extends: .install_dependencies
  image: mcr.microsoft.com/playwright:v1.51.0-noble
  stage: build-projet
  allow_failure: true
  timeout: 5h
  retry:
    max: 2
    when:
      - runner_system_failure
      - api_failure
      - unknown_failure
  artifacts:
    when: always
    paths:
      - tests/e2e/logs
    reports:
      junit:
        - tests/e2e/logs/junit-report.xml
    expire_in: 10 day

playwright-console-consolidated:
  extends: .testCI
  stage: playwright-test
  timeout: 5h
  script:
    - |
      FAIL=0

      run_console () {
        NIV_LABEL="$1"
        STATUS_VAR="$2"
        echo "рџ§Є console_errors NIV=$NIV_LABEL"
        if NIV="$NIV_LABEL" pnpm test:e2e:console_errors; then
          eval "$STATUS_VAR=ok"
        else
          eval "$STATUS_VAR=ko"
          FAIL=1
        fi
      }

      run_console "6e/6" STATUS_6E
      run_console "5e/5" STATUS_5E
      run_console "4e/4" STATUS_4E
      run_console "3e/3" STATUS_3E
      run_console "2e/2" STATUS_2E
      run_console "1e/1" STATUS_1E
      run_console "TEx^TSpe^techno" STATUS_TEX_TSPE_TECHNO
      run_console "QCM" STATUS_QCM
      run_console "can/6e^can/5e" STATUS_CAN_6E_5E
      run_console "can/4e^can/3e" STATUS_CAN_4E_3E
      run_console "can/2e^can/1e" STATUS_CAN_2E_1E
      run_console "can/Ex^can/TSpe" STATUS_CAN_EX_TSPE

      echo ""
      echo "в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ"
      echo "рџ“Љ RГ©sumГ© console consolidated"
      echo "в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ"
      [ "$STATUS_6E" = "ok" ] && echo "вњ… 6e/6" || echo "вќЊ 6e/6"
      [ "$STATUS_5E" = "ok" ] && echo "вњ… 5e/5" || echo "вќЊ 5e/5"
      [ "$STATUS_4E" = "ok" ] && echo "вњ… 4e/4" || echo "вќЊ 4e/4"
      [ "$STATUS_3E" = "ok" ] && echo "вњ… 3e/3" || echo "вќЊ 3e/3"
      [ "$STATUS_2E" = "ok" ] && echo "вњ… 2e/2" || echo "вќЊ 2e/2"
      [ "$STATUS_1E" = "ok" ] && echo "вњ… 1e/1" || echo "вќЊ 1e/1"
      [ "$STATUS_TEX_TSPE_TECHNO" = "ok" ] && echo "вњ… TEx^TSpe^techno" || echo "вќЊ TEx^TSpe^techno"
      [ "$STATUS_QCM" = "ok" ] && echo "вњ… QCM" || echo "вќЊ QCM"
      [ "$STATUS_CAN_6E_5E" = "ok" ] && echo "вњ… can/6e^can/5e" || echo "вќЊ can/6e^can/5e"
      [ "$STATUS_CAN_4E_3E" = "ok" ] && echo "вњ… can/4e^can/3e" || echo "вќЊ can/4e^can/3e"
      [ "$STATUS_CAN_2E_1E" = "ok" ] && echo "вњ… can/2e^can/1e" || echo "вќЊ can/2e^can/1e"
      [ "$STATUS_CAN_EX_TSPE" = "ok" ] && echo "вњ… can/Ex^can/TSpe" || echo "вќЊ can/Ex^can/TSpe"
      echo "в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ"

      exit "$FAIL"


    expire_in: 1 day

playwright-caneleve-consolidated:
  extends: .testCI
  stage: playwright-testCanEleve
  allow_failure: true
  timeout: 5h
  script:
    - |
      FAIL=0

      echo "🧪 test:e2e:views"
      if pnpm test:e2e:views; then
        STATUS_VIEWS=ok
      else
        STATUS_VIEWS=ko
        FAIL=1
      fi

      echo "🧪 test:e2e:consistency"
      if pnpm test:e2e:consistency; then
        STATUS_CONSISTENCY=ok
      else
        STATUS_CONSISTENCY=ko
        FAIL=1
      fi

      echo "🧪 test:e2e:interactivity"
      if pnpm test:e2e:interactivity; then
        STATUS_INTERACTIVITY=ok
      else
        STATUS_INTERACTIVITY=ko
        FAIL=1
      fi

      echo ""
      echo "═══════════════════════════════════════════"
      echo "📊 Résumé caneleve consolidated"
      echo "═══════════════════════════════════════════"
      [ "$STATUS_VIEWS" = "ok" ] && echo "✅ test:e2e:views" || echo "❌ test:e2e:views"
      [ "$STATUS_CONSISTENCY" = "ok" ] && echo "✅ test:e2e:consistency" || echo "❌ test:e2e:consistency"
      [ "$STATUS_INTERACTIVITY" = "ok" ] && echo "✅ test:e2e:interactivity" || echo "❌ test:e2e:interactivity"
      echo "═══════════════════════════════════════════"

      exit "$FAIL"
  rules:
    # Se lance uniquement si le pipeline est déclenché par une Merge Request
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: always
    - if: $CI_COMMIT_BRANCH == "main"
      when: always
    - if: $CI_COMMIT_BRANCH == "guironne-jobs"
      when: manual
    - when: never
  artifacts:
    when: on_failure
  retry:
    max: 2
    when:
      - runner_system_failure
      - api_failure
      - unknown_failure
      - script_failure

# Job consolidé : exécute les tests des exercices modifiés en séquence
# Cela remplace 4 jobs précédents :
# - testExosModifiedWithoutPlayWright
# - testExosModified
# - testExosModifiedInteractif
# - testExosModifiedAmcnum
# Économies : 1 seul runner, 1 seule installation de dépendances, 1 seul démarrage du serveur
testExosModifiedConsolidated:
  extends: .testExosModifiedConsolidated
  script:
    # Récupérer les fichiers modifiés depuis les 5 derniers commits
    - git fetch origin "$CI_COMMIT_REF_NAME" --depth=10
    - git checkout FETCH_HEAD
    - |
      # ============================================================
      # PHASE 1: Récupérer les fichiers modifiés
      # ============================================================
      COMMIT_COUNT=$(git rev-list --count HEAD)
      MAX_COMMITS=5

      if [ "$COMMIT_COUNT" -lt "$MAX_COMMITS" ]; then
        DIFF_BASE="HEAD~$((COMMIT_COUNT - 1))"
      else
        DIFF_BASE="HEAD~$MAX_COMMITS"
      fi
      echo "Comparing from $DIFF_BASE to HEAD"

      if git rev-parse --verify "$DIFF_BASE" >/dev/null 2>&1; then
        echo "Comparing from $DIFF_BASE to HEAD"
        CHANGED_FILES=$(git diff --name-only "$DIFF_BASE"..HEAD)
      else
        echo "⚠️ Le commit $DIFF_BASE n'est pas disponible (clone trop peu profond ?)"
        CHANGED_FILES=$(git diff --name-only $CI_COMMIT_BEFORE_SHA $CI_COMMIT_SHA)
      fi

      echo ""
      echo "📋 Fichiers modifiés:"
      echo "$CHANGED_FILES"
      echo ""

      # ============================================================
      # PHASE 2: Tests unitaires et e2e
      # ============================================================

      # Test 1/4 : Console errors (Playwright)
      echo "🧪 Test 1/4: Console errors..."
      if CHANGED_FILES="$CHANGED_FILES" pnpm test:e2e:console_errors; then
        STATUS_CONSOLE=ok
      else
        STATUS_CONSOLE=ko
      fi

      # Test 2/4 : All exercises vitest (sans Playwright)
      echo "🧪 Test 2/4: All exercises vitest..."
      if CHANGED_FILES="$CHANGED_FILES" pnpm vitest --config tests/e2e/vitest.config.all_exercises.js --run; then
        STATUS_VITEST=ok
      else
        STATUS_VITEST=ko
      fi

      # Test 3/4 : Interactivity report
      echo "🧪 Test 3/4: Interactivity report..."
      if INTERACTIF_REPORT=1 CHANGED_FILES="$CHANGED_FILES" pnpm vitest src/lib/amc/report-interactif.test.ts --run; then
        STATUS_INTERACTIF=ok
      else
        STATUS_INTERACTIF=ko
      fi

      # Test 4/4 : AMCnum report
      echo "🧪 Test 4/4: AMCnum report..."
      if AMCNUM_REPORT=1 CHANGED_FILES="$CHANGED_FILES" pnpm vitest src/lib/amc/report-amcnum.test.ts --run; then
        STATUS_AMCNUM=ok
      else
        STATUS_AMCNUM=ko
      fi

      # ============================================================
      # PHASE 3: Résumé final
      # ============================================================
      echo ""
      echo "═══════════════════════════════════════════"
      echo "📊 Résumé des tests consolidés"
      echo "═══════════════════════════════════════════"
      [ "$STATUS_CONSOLE" = "ok" ] && echo "✅ Console errors" || echo "❌ Console errors"
      [ "$STATUS_VITEST" = "ok" ] && echo "✅ All exercises vitest" || echo "❌ All exercises vitest"
      [ "$STATUS_INTERACTIF" = "ok" ] && echo "✅ Interactivity report" || echo "❌ Interactivity report"
      [ "$STATUS_AMCNUM" = "ok" ] && echo "✅ AMCnum report" || echo "❌ AMCnum report"

      OK_COUNT=0
      [ "$STATUS_CONSOLE" = "ok" ] && OK_COUNT=$((OK_COUNT + 1))
      [ "$STATUS_VITEST" = "ok" ] && OK_COUNT=$((OK_COUNT + 1))
      [ "$STATUS_INTERACTIF" = "ok" ] && OK_COUNT=$((OK_COUNT + 1))
      [ "$STATUS_AMCNUM" = "ok" ] && OK_COUNT=$((OK_COUNT + 1))
      echo ""
      echo "Résultat global: $OK_COUNT/4 sous-tests OK"
      echo "═══════════════════════════════════════════"

      # Fail si au moins un test a échoué
      if [ "$OK_COUNT" -lt 4 ]; then
        exit 1
      fi
  rules:
    # Se lance uniquement si le pipeline est déclenché par une Merge Request
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: always
    - if: $CI_COMMIT_BRANCH == "main"
      when: always
    - if: $CI_COMMIT_BRANCH == "guironne-jobs"
      when: manual
    - when: never


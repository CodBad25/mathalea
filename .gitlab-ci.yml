# Job consolidГ© : exГ©cute les tests des exercices modifiГ©s en sГ©quence
# Cela remplace 4 jobs prГ©cГ©dents :
# - testExosModifiedWithoutPlayWright
# - testExosModified
# - testExosModifiedInteractif
# - testExosModifiedAmcnum
# Г‰conomies : 1 seul runner, 1 seule installation de dГ©pendances, 1 seul dГ©marrage du serveur
testExosModifiedConsolidated:
  extends: .testExosModifiedConsolidated
  script:
    # RГ©cupГ©rer les fichiers modifiГ©s depuis les 5 derniers commits
    - git fetch origin "$CI_COMMIT_REF_NAME" --depth=10
    - git checkout FETCH_HEAD
    - |
      # ============================================================
      # PHASE 1: RГ©cupГ©rer les fichiers modifiГ©s
      # ============================================================
      COMMIT_COUNT=$(git rev-list --count HEAD)
      MAX_COMMITS=5

      if [ "$COMMIT_COUNT" -lt "$MAX_COMMITS" ]; then
        DIFF_BASE="HEAD~$((COMMIT_COUNT - 1))"
      else
        DIFF_BASE="HEAD~$MAX_COMMITS"
      fi
      echo "Comparing from $DIFF_BASE to HEAD"

      if git rev-parse --verify "$DIFF_BASE" >/dev/null 2>&1; then
        echo "Comparing from $DIFF_BASE to HEAD"
        CHANGED_FILES=$(git diff --name-only "$DIFF_BASE"..HEAD)
      else
        echo "вљ пёЏ Le commit $DIFF_BASE n'est pas disponible (clone trop peu profond ?)"
        CHANGED_FILES=$(git diff --name-only $CI_COMMIT_BEFORE_SHA $CI_COMMIT_SHA)
      fi

      echo ""
      echo "рџ“‹ Fichiers modifiГ©s:"
      echo "$CHANGED_FILES"
      echo ""

      # ============================================================
      # PHASE 2: Tests unitaires et e2e
      # ============================================================

      # Test 1/4 : Console errors (Playwright)
      echo "рџ§Є Test 1/4: Console errors..."
      if CHANGED_FILES="$CHANGED_FILES" pnpm test:e2e:console_errors; then
        STATUS_CONSOLE=ok
      else
        STATUS_CONSOLE=ko
      fi

      # Test 2/4 : All exercises vitest (sans Playwright)
      echo "рџ§Є Test 2/4: All exercises vitest..."
      if CHANGED_FILES="$CHANGED_FILES" pnpm vitest --config tests/e2e/vitest.config.all_exercises.js --run; then
        STATUS_VITEST=ok
      else
        STATUS_VITEST=ko
      fi

      # Test 3/4 : Interactivity report
      echo "рџ§Є Test 3/4: Interactivity report..."
      if INTERACTIF_REPORT=1 CHANGED_FILES="$CHANGED_FILES" pnpm vitest tests/unit/report-interactif.test.ts --run; then
        STATUS_INTERACTIF=ok
      else
        STATUS_INTERACTIF=ko
      fi

      # Test 4/4 : AMCnum report
      echo "рџ§Є Test 4/4: AMCnum report..."
      if AMCNUM_REPORT=1 CHANGED_FILES="$CHANGED_FILES" pnpm vitest tests/unit/report-amcnum.test.ts --run; then
        STATUS_AMCNUM=ok
      else
        STATUS_AMCNUM=ko
      fi

      # ============================================================
      # PHASE 3: RГ©sumГ© final
      # ============================================================
      echo ""
      echo "в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ"
      echo "рџ“Љ RГ©sumГ© des tests consolidГ©s"
      echo "в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ"
      [ "$STATUS_CONSOLE" = "ok" ] && echo "вњ… Console errors" || echo "вќЊ Console errors"
      [ "$STATUS_VITEST" = "ok" ] && echo "вњ… All exercises vitest" || echo "вќЊ All exercises vitest"
      [ "$STATUS_INTERACTIF" = "ok" ] && echo "вњ… Interactivity report" || echo "вќЊ Interactivity report"
      [ "$STATUS_AMCNUM" = "ok" ] && echo "вњ… AMCnum report" || echo "вќЊ AMCnum report"

      OK_COUNT=0
      [ "$STATUS_CONSOLE" = "ok" ] && OK_COUNT=$((OK_COUNT + 1))
      [ "$STATUS_VITEST" = "ok" ] && OK_COUNT=$((OK_COUNT + 1))
      [ "$STATUS_INTERACTIF" = "ok" ] && OK_COUNT=$((OK_COUNT + 1))
      [ "$STATUS_AMCNUM" = "ok" ] && OK_COUNT=$((OK_COUNT + 1))
      echo ""
      echo "RГ©sultat global: $OK_COUNT/4 sous-tests OK"
      echo "в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ"

      # Fail si au moins un test a Г©chouГ©
      if [ "$OK_COUNT" -lt 4 ]; then
        exit 1
      fi
  rules:
    # Se lance uniquement si le pipeline est dГ©clenchГ© par une Merge Request
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: always
    - if: $CI_COMMIT_BRANCH == "main"
      when: always
    - if: $CI_COMMIT_BRANCH == "guironne-jobs"
      when: manual
    - when: never


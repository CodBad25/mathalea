tests-unitaires:
  stage: build-projet
  script:
    - npm install -g corepack@latest
    - corepack enable
    - corepack prepare pnpm@latest-10 --activate
    - pnpm config set store-dir .pnpm-store
    - pnpm -v
    - echo "CI_COMMIT_BRANCH '$CI_COMMIT_BRANCH'"
    - echo "CI_OPEN_MERGE_REQUESTS '$CI_OPEN_MERGE_REQUESTS'"
    - echo "CI_PIPELINE_SOURCE '$CI_PIPELINE_SOURCE'"
    - echo "$CI_COMMIT_AUTHOR"
    - pnpm install --silent
    - pnpm run makeJson
    - NODE_OPTIONS=--max-old-space-size=4096 pnpm test:unit
    - NODE_OPTIONS=--max-old-space-size=4096 pnpm test:src
  rules:
    # Se lance uniquement si le pipeline est déclenché par une Merge Request
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: always
    - if: $CI_COMMIT_BRANCH == "main"
      when: always
    - if: $CI_COMMIT_BRANCH == "guironne-jobs"
      when: manual
    - when: never
  artifacts:
    when: on_failure

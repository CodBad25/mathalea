build:
  image: node:20-bullseye
  allow_failure: true
  variables:
    KUBERNETES_MEMORY_REQUEST: '5Gi'
    KUBERNETES_MEMORY_LIMIT: '6Gi'
  stage: build-projet
  before_script:
    - npm install -g corepack@latest
    - corepack enable
    - corepack prepare pnpm@latest-10 --activate
    - pnpm config set store-dir .pnpm-store
    - pnpm -v
    - NODE_OPTIONS=--max-old-space-size=4096 pnpm install
  script:
    - echo "CI_COMMIT_BRANCH '$CI_COMMIT_BRANCH'"
    - echo "CI_OPEN_MERGE_REQUESTS '$CI_OPEN_MERGE_REQUESTS'"
    - echo "CI_PIPELINE_SOURCE '$CI_PIPELINE_SOURCE'"
    # Г‰tape 1: makeJson
    - pnpm run makeJson
    # Г‰tape 2: build sГ©parГ©
    - NODE_OPTIONS="--max-old-space-size=5096 --expose-gc" pnpm vite build
    # - NODE_OPTIONS=--max-old-space-size=4096 pnpm run makeJson && pnpm vite build
    - echo "$CI_COMMIT_AUTHOR"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: always
    - if: $CI_COMMIT_BRANCH == "guironne-jobs"
      when: manual
    - when: never
  artifacts:
    when: always
    paths:
      - dist
    expire_in: 1 day

deployftp:
  image: ubuntu
  stage: deploy-server
  allow_failure: true
  script:
    - echo "CI_COMMIT_BRANCH '$CI_COMMIT_BRANCH'"
    - echo "CI_OPEN_MERGE_REQUESTS '$CI_OPEN_MERGE_REQUESTS'"
    - echo "CI_PIPELINE_SOURCE '$CI_PIPELINE_SOURCE'"
    - apt-get update -y && apt-get install -y lftp
    - date_deploy=$(date +%Y-%m-%d_%H-%M-%S)
